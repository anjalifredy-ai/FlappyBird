name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;25.2.9519653"

      - name: Install Android platform
        run: sdkmanager "platforms;android-30" "build-tools;30.0.3"

      - name: Build native code
        run: |
          cd FlappyBird/app/src/main
          $ANDROID_HOME/ndk/25.2.9519653/ndk-build

      - name: Build APK with aapt
        run: |
          cd FlappyBird
          mkdir -p app/build/outputs/apk
          $ANDROID_HOME/build-tools/30.0.3/aapt package -f \
            -M app/src/main/AndroidManifest.xml \
            -S app/src/main/res \
            -A app/src/main/assets \
            -I $ANDROID_HOME/platforms/android-30/android.jar \
            -F app/build/outputs/apk/unaligned.apk
          $ANDROID_HOME/build-tools/30.0.3/zipalign -f 4 \
            app/build/outputs/apk/unaligned.apk \
            app/build/outputs/apk/aligned.apk

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          cd FlappyBird
          $ANDROID_HOME/build-tools/30.0.3/apksigner sign \
            --ks ../debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app/build/outputs/apk/FlappyBird.apk \
            app/build/outputs/apk/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlappyBird-APK
          path: FlappyBird/app/build/outputs/apk/FlappyBird.apk
